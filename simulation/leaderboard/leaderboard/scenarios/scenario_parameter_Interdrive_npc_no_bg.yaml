CycleScenarios:
    CyclistCrossing:
        proportion : 0.0
        cross_time: 0.5 # Time for the cyclist to cross the road
        spawn_dist: 20 # Distance between the cyclist and the trigger point
        walk_dist: 30 # Distance the cyclist should walk
        trigger_dist: 5 # Distance between the trigger point and the ego vehicle
        end_dist: 40 # Distance between the end point and the ego vehicle
        speed: 4 # Speed of the cyclist

    FreeRide:
        proportion: 1.0 # Proportion of the FreeRide scenario

PedestrianScenarios:  
    PedestrianCrossingJunction:
        proportion: 0.0 # Proportion of the scenario in PedestrianScenarios
        cross_time: 0.5 # Time for the pedestrian to cross the road
        spawn_dist: 20 # Distance between the pedestrian and the trigger point
        walk_dist: 30 # Distance the pedestrian should walk
        trigger_dist: 5 # Distance between the trigger point and the ego vehicle
        end_dist: 40 # Distance between the end point and the ego vehicle
        speed: 4 # Speed of the pedestrian
    
    FreeRide:
        proportion: 1.0 # Proportion of the FreeRide scenario

PassingScenarios:
    PassObstacle:
        proportion: 0.0 # Proportion of PassObstacle scenario
        spawn_dist: 30 # Spawn the actor at this distance (maybe not precise)
        end_dist: 60 # Distance betwwen the trigger point and the ego-vehicle when the scenario ends

    FreeRide:
        proportion: 1.0 # Proportion of FreeRide

