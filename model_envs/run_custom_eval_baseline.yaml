name: run_custom_eval_baseline
channels:
  - pytorch
  - defaults
  - conda-forge
dependencies:
  # Bundled CARLA 0.9.12 artifacts in ./carla912 are cp37/py3.7:
  #   carla-0.9.12-cp37-*.whl
  #   carla-0.9.12-py3.7-*.egg
  # Keep py3.7 for first-try compatibility with that CARLA_ROOT.
  # Use a relaxed 3.7 pin (not 3.7.12 exact) so current channels can solve.
  - conda-forge::python=3.7
  - pip=23.2.1
  - setuptools=65.6.3
  - wheel=0.38.4

  # `leaderboard_evaluator_parameter.py` imports torch unconditionally.
  # CPU build keeps setup simple and portable; planner-specific envs can swap to CUDA torch.
  #
  # IMPORTANT: torch 1.10.x expects Intel JIT profiling symbols (`iJIT_*`)
  # that are present in older MKL runtimes (e.g. 2023.x) but missing in newer
  # conda-forge MKL 2025.x builds. Pin MKL/OpenMP from defaults to avoid:
  #   libtorch_cpu.so: undefined symbol: iJIT_NotifyEvent
  - defaults::mkl=2023.1.0
  - defaults::intel-openmp=2023.1.0
  - pytorch::pytorch=1.10.1
  - pytorch::cpuonly

  # Keep evaluator/runtime deps in pip with py37-compatible pins.
  # Pins chosen to match versions already used in this repo's py37 env stacks.
  - pip:
      - numpy==1.21.6
      - scipy==1.7.3
      - matplotlib==3.5.3
      - pillow==9.4.0
      - pyyaml==6.0.1
      - requests==2.31.0
      - tabulate==0.9.0
      - networkx==2.2
      - shapely==1.8.5
      - six==1.16.0
      - opencv-python==4.2.0.34
      - py-trees==0.8.3
      - dictor==0.1.12
      - ephem==4.2
      - xmlschema==1.0.18
